<!DOCTYPE html>
<html lang="en">
<head> 
<link rel="manifest" href="./manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PPL Trainer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;min-height:100dvh;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;padding:16px 16px 60px;overflow-x:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-.5px}
.hdr-btn{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:10px;color:#ccc;padding:8px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.hdr-btn:active{background:#2a2a3e}
.tcards{display:flex;flex-direction:column;gap:12px;margin-top:16px}
.tcard{border-radius:16px;padding:20px;cursor:pointer;border:1px solid transparent;transition:transform .12s}
.tcard:active{transform:scale(.98)}
.tcard.push{background:linear-gradient(135deg,#1e3a5f,#141428);border-color:#3b82f630}
.tcard.pull{background:linear-gradient(135deg,#1a4a2e,#141428);border-color:#22c55e30}
.tcard.legs{background:linear-gradient(135deg,#4a2e1a,#141428);border-color:#f9731630}
.tcard h2{font-size:18px;margin-bottom:4px}
.tcard p{font-size:13px;color:#888}
.tcard .elist{font-size:12px;color:#555;margin-top:8px;line-height:1.7}
.shdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.shdr h2{font-size:20px;flex:1}
.bbtn{background:none;border:1px solid #333;border-radius:10px;color:#aaa;padding:8px 14px;font-size:13px;cursor:pointer}
.bbtn:active{background:#1a1a2e}
.warmup{background:#1a1a2e;border-radius:14px;padding:16px;margin-bottom:16px;border:1px solid #2a2a3e}
.warmup h3{font-size:15px;margin-bottom:10px}
.warmup li{font-size:13px;color:#aaa;padding:3px 0;list-style:none}
.warmup li::before{content:'◦ ';color:#555}
.wbtn{width:100%;padding:12px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px;color:#fff}
.wbtn:active{opacity:.8}
.warmup.done{opacity:.45;pointer-events:none}
.warmup.done .wbtn{display:none}
.excard{background:#1a1a2e;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #2a2a3e}
.exname{font-size:17px;font-weight:600;margin-bottom:2px}
.exmeta{font-size:12px;color:#777;margin-bottom:8px}
.exlast{font-size:11px;color:#999;background:#ffffff06;padding:6px 10px;border-radius:8px;margin-bottom:10px;line-height:1.6;display:block}
.exlast b{color:#bbb;font-weight:600}
.ttog{display:flex;align-items:center;gap:6px;color:#666;font-size:13px;cursor:pointer;background:none;border:none;padding:4px 0;margin-bottom:6px}
.ttog:active{color:#999}
.tbox{background:#0d0d18;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #1e1e30;display:none}
.tbox.open{display:block}
.tbox svg{display:block;margin:0 auto 10px;width:150px;height:auto}
.tbox p{font-size:12px;color:#888;line-height:1.5}
.srow{display:flex;align-items:center;gap:5px;margin-bottom:6px;padding:8px 6px;background:#0d0d18;border-radius:10px;border-left:3px solid transparent;flex-wrap:nowrap}
.srow.done{border-left-color:#22c55e30;opacity:.6}
.slbl{font-size:12px;color:#555;width:20px;flex-shrink:0;text-align:center}
.sinp{background:#080812;border:1px solid #252535;border-radius:8px;color:#e0e0e0;padding:7px 2px;font-size:14px;width:48px;text-align:center;-webkit-appearance:none;appearance:none}
.sinp:focus{outline:none;border-color:#444}
.sunit{font-size:10px;color:#444;flex-shrink:0}
.feels{display:flex;gap:2px;margin-left:auto}
.fb{width:28px;height:28px;border-radius:50%;border:1px solid #252535;background:transparent;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.fb.on{border-color:#555;background:#2a2a3e}
.fb:active{transform:scale(.9)}
.sd{width:30px;height:30px;border-radius:50%;border:1px solid #252535;background:transparent;color:#444;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sd:active{background:#1a1a2e}
.sd.chk{background:#22c55e25;border-color:#22c55e50;color:#22c55e}
.timer-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0fF2;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200}
.timer-ov .tt{font-size:72px;font-weight:700;font-variant-numeric:tabular-nums}
.timer-ov .tl{font-size:15px;color:#777;margin-bottom:16px}
.timer-ov .tb{width:180px;height:5px;background:#1a1a2e;border-radius:3px;margin-top:16px;overflow:hidden}
.timer-ov .tf{height:100%;border-radius:3px;transition:width .3s linear}
.timer-ov .ts{margin-top:28px;background:none;border:1px solid #333;color:#888;padding:12px 32px;border-radius:12px;font-size:15px;cursor:pointer}
.timer-ov .ts:active{background:#1a1a2e}
.finbtn{width:100%;padding:16px;border-radius:14px;border:none;font-size:17px;font-weight:700;cursor:pointer;margin-top:16px;color:#fff}
.finbtn:active{opacity:.8}
.finbtn:disabled{opacity:.3;pointer-events:none}
.slabel{font-size:12px;color:#444;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.empty{text-align:center;color:#444;padding:40px 20px;font-size:14px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-size:17px;font-weight:600;letter-spacing:-.3px}
.cal-arr{background:none;border:1px solid #2a2a3e;border-radius:10px;color:#aaa;width:38px;height:38px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cal-arr:active{background:#1a1a2e;transform:scale(.95)}
.cal-wrap{width:100%;overflow:hidden}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px;width:100%}
.cal-hdr{text-align:center;font-size:9px;color:#444;padding:4px 0;text-transform:uppercase;letter-spacing:.3px;font-weight:600;overflow:hidden;min-width:0}
.cal-day{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:#333;position:relative;background:#0d0d14;border:1.5px solid #151520;transition:all .12s;min-width:0;overflow:hidden;padding:1px}
.cal-day.empty{background:transparent;border-color:transparent}
.cal-day.has-date{color:#555}
.cal-day.today{border-color:#555;color:#aaa}
.cal-day.today .day-num{font-weight:700}
.cal-day.workout{cursor:pointer;color:#ddd}
.cal-day.workout:active{transform:scale(.92)}
.cal-day.sel{border-width:2px}
.cal-dots{display:flex;gap:2px;margin-top:1px}
.cal-dot{width:4px;height:4px;border-radius:50%}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stat-card{background:#1a1a2e;border-radius:12px;padding:10px 4px;border:1px solid #2a2a3e;text-align:center}
.stat-num{font-size:20px;font-weight:700}
.stat-lbl{font-size:9px;color:#555;margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.type-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.type-chip{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600}
.day-detail{margin-top:8px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.dex{background:#0d0d18;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #1e1e30}
.dex-name{font-size:14px;font-weight:600;margin-bottom:6px}
.dex-set{font-size:12px;color:#aaa;padding:2px 0}
.dex-hdr{font-size:13px;font-weight:600;margin-bottom:8px;text-transform:capitalize;display:flex;align-items:center;gap:8px}
.dex-hdr::after{content:'';flex:1;height:1px;background:#1e1e30}
.no-data{text-align:center;color:#333;padding:24px 16px;font-size:13px;border:1px dashed #1e1e30;border-radius:12px;margin-bottom:16px}
.io-bar{display:flex;gap:8px;margin-bottom:16px}
.io-btn{flex:1;padding:10px;border-radius:10px;border:1px solid #2a2a3e;background:#1a1a2e;color:#aaa;font-size:13px;font-weight:600;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.io-btn:active{background:#2a2a3e;transform:scale(.97)}
#file-input{display:none}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#22c55e;color:#000;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:300;animation:toastIn .3s ease,toastOut .3s ease 2s forwards;pointer-events:none;white-space:nowrap}
.toast.err{background:#ef4444;color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.confirm-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0fE8;display:flex;align-items:center;justify-content:center;z-index:250;padding:24px}
.confirm-box{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:16px;padding:24px;max-width:320px;width:100%;text-align:center}
.confirm-box h3{font-size:16px;margin-bottom:8px}
.confirm-box p{font-size:13px;color:#888;margin-bottom:20px;line-height:1.5}
.import-choice{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.import-choice button{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.import-choice .ic-replace{background:#ef4444;color:#fff}
.import-choice .ic-merge{background:#3b82f6;color:#fff}
.import-choice .ic-cancel{background:#252535;color:#aaa}
@media(max-width:374px){
.sinp{width:42px;font-size:13px;padding:6px 1px}
.fb{width:25px;height:25px;font-size:11px}
.sd{width:27px;height:27px;font-size:13px}
.slbl{width:16px;font-size:11px}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.cal-day{font-size:11px;border-radius:6px}
.cal-hdr{font-size:8px}
.cal-dot{width:3px;height:3px}
}
</style>
</head>

<div id="app"></div>
<div id="overlays"></div>

exercises:[
{id:'bench_press',name:'Flat Barbell Bench Press',sets:4,reps:'8-10',rest:120,tip:'Retract shoulder blades, plant feet flat. Lower bar to mid-chest, press up in slight arc. Keep wrists straight over elbows.'},
{id:'overhead_press',name:'Overhead Press',sets:3,reps:'8-10',rest:90,tip:'Start at collarbone level. Press straight up, moving head through at top. Brace core tight, avoid leaning back.'},
{id:'incline_db_fly',name:'Incline DB Fly',sets:3,reps:'10-12',rest:90,tip:'Set bench to 30°. Start with dumbbells above chest, palms facing in. Open arms wide in a big arc with a slight elbow bend. Feel a deep stretch in your chest at the bottom, then squeeze pecs to bring dumbbells back together.'},
{id:'cable_flyes',name:'Cable Flyes',sets:3,reps:'12-15',rest:45,tip:'Slight bend in elbows throughout. Bring hands together at chest height. Squeeze pecs at the peak, slow return.'},
{id:'tricep_pushdown',name:'Tricep Pushdown',sets:3,reps:'12-15',rest:45,tip:'Pin elbows to sides. Only forearms move. Full extension at bottom, squeeze triceps. Control the weight back up.'}
]},

{id:'lat_pulldown',name:'Lat Pulldown',sets:3,reps:'10-12',rest:90,tip:'Grip slightly wider than shoulders. Pull bar to upper chest, leading with elbows. Lean back slightly, feel lats stretch at top.'},
{id:'seated_cable_row',name:'Seated Cable Row',sets:3,reps:'10-12',rest:90,tip:'Sit tall, slight knee bend. Pull handle to lower chest. Squeeze shoulder blades, extend arms fully.'},
{id:'face_pull',name:'Face Pull',sets:3,reps:'15-20',rest:45,tip:'Set cable at face height. Pull rope to ears, externally rotating at the end. Elbows high and wide.'},
{id:'barbell_curl',name:'Barbell Curl',sets:3,reps:'10-12',rest:45,tip:'Stand tall, elbows pinned to sides. Curl with control, squeeze at top. Lower slowly.'}

{id:'leg_curl',name:'Leg Curl',sets:3,reps:'12-15',rest:45,tip:'Adjust pad above ankles. Curl fully, squeeze hamstrings at top. Lower slowly. Keep hips pressed down.'},
{id:'calf_raise',name:'Calf Raise',sets:4,reps:'15-20',rest:45,tip:'Full range — drop heels low, rise to maximum. Pause at top 1-2s. Slow negative.'}
]}
};

// ===== STATE =====
let state={view:'home',type:null,warmupDone:false,session:null,openTips:new Set(),timerActive:false,histMonth:null,histYear:null,selectedDate:null};
let history=[];

function loadHistory(){
try{const s=localStorage.getItem('ppl_history');if(s){history=JSON.parse(s);}}catch(e){history=[];}
}
function saveHistory(){try{localStorage.setItem('ppl_history',JSON.stringify(history));}catch(e){}}

function getLastSession(type){
return history.filter(h=>h.type===type).sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
}
function getLastExercise(type,exId){
const s=getLastSession(type);if(!s)return null;
return s.exercises.find(e=>e.id===exId)||null;
}

// ===== IMPORT / EXPORT =====
function exportData(){
if(!history.length){showToast('No data to export','err');return;}
const blob=new Blob([JSON.stringify(history,null,2)],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
const d=new Date();
a.href=url;
a.download=`ppl-history-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
document.body.appendChild(a);a.click();document.body.removeChild(a);
URL.revokeObjectURL(url);
showToast(`Exported ${history.length} sessions`);
}

function triggerImport(){
document.getElementById('file-input').click();
}

function handleImport(e){
const file=e.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=function(ev){
try{
const data=JSON.parse(ev.target.result);
if(!Array.isArray(data))throw new Error('Not an array');
const valid=data.every(d=>d.date&&d.type&&Array.isArray(d.exercises));
if(!valid)throw new Error('Invalid format');
pendingImport=data;
if(history.length>0){
showImportChoice(data.length);
}else{
history=data;
saveHistory();
pendingImport=null;
showToast(`Imported ${data.length} sessions`);
render();
}
}catch(err){
showToast('Invalid file format','err');
}
};
reader.readAsText(file);
e.target.value='';
}

let pendingImport=null;

function importReplace(){
if(!pendingImport)return;
history=pendingImport;
saveHistory();
const n=pendingImport.length;
pendingImport=null;
closeOverlay();
showToast(`Replaced with ${n} sessions`);
render();
}

function importMerge(){
if(!pendingImport)return;
const existingDates=new Set(history.map(h=>h.date+h.type));
let added=0;
pendingImport.forEach(s=>{
const key=s.date+s.type;
if(!existingDates.has(key)){history.push(s);added++;}
else{
const idx=history.findIndex(h=>h.date===s.date&&h.type===s.type);
if(idx>=0)history[idx]=s;
}
});
saveHistory();
pendingImport=null;
closeOverlay();
showToast(`Merged — ${added} new sessions added`);
render();
}

function showImportChoice(count){
const ov=document.getElementById('overlays');
ov.innerHTML=`<div class="confirm-ov" id="confirm-overlay">
<div class="confirm-box">
<h3>Import ${count} sessions</h3>
<p>You already have ${history.length} sessions. How would you like to import?</p>
<div class="import-choice">
<button class="ic-merge" onclick="importMerge()">🔀 Merge (keep both)</button>
<button class="ic-replace" onclick="importReplace()">🗑 Replace all</button>
<button class="ic-cancel" onclick="cancelImport()">Cancel</button>
</div>
</div></div>`;
}

function cancelImport(){
pendingImport=null;
closeOverlay();
}

function closeOverlay(){
document.getElementById('overlays').innerHTML='';
}

function showToast(msg,type){
const existing=document.querySelectorAll('.toast');
existing.forEach(e=>e.remove());
const t=document.createElement('div');
t.className='toast'+(type==='err'?' err':'');
t.textContent=msg;
document.body.appendChild(t);
setTimeout(()=>{if(t.parentNode)t.remove();},2500);
}

// ===== TIMER =====
let audioCtx=null,timerStart=null,timerDur=0,timerCol='',timerRAF=null;

function startRestTimer(seconds,color){
timerDur=seconds;timerCol=color;timerStart=Date.now();state.timerActive=true;
try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
renderTimer();tickTimer();
}

function tickTimer(){
if(!state.timerActive)return;
const el=(Date.now()-timerStart)/1000;
if(el>=timerDur){state.timerActive=false;
if(navigator.vibrate)navigator.vibrate([200,100,200]);
const ov=document.getElementById('timer-overlay');if(ov)ov.remove();
render();return;}
updateTimerUI(el);timerRAF=requestAnimationFrame(tickTimer);
}

function renderTimer(){
const ov=document.createElement('div');ov.className='timer-ov';ov.id='timer-overlay';
const rem=timerDur;const m=Math.floor(rem/60);const s=rem%60;
ov.innerHTML=`<div class="tl">Rest Timer</div><div class="tt" id="timer-num">${m}:${String(s).padStart(2,'0')}</div><div class="tb"><div class="tf" id="timer-fill" style="width:0%;background:${timerCol}"></div></div><button class="ts" onclick="skipRest()">Skip</button>`;
document.body.appendChild(ov);
}

function updateTimerUI(el){
const rem=Math.max(0,timerDur-el);const m=Math.floor(rem/60);const s=Math.floor(rem%60);
const numEl=document.getElementById('timer-num');
const fillEl=document.getElementById('timer-fill');
if(numEl)numEl.textContent=`${m}:${String(s).padStart(2,'0')}`;
if(fillEl)fillEl.style.width=`${(el/timerDur)*100}%`;
}

function skipRest(){
state.timerActive=false;if(timerRAF)cancelAnimationFrame(timerRAF);
const ov=document.getElementById('timer-overlay');if(ov)ov.remove();
}

// ===== HELPERS =====
function formatDate(d){
const dt=new Date(d+'T12:00:00');
return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function formatVol(v){
if(v>=1000)return(v/1000).toFixed(1)+'k';
return String(v);
}
function today(){return new Date().toISOString().split('T')[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}

// ===== RENDER =====
function render(){
const ov=document.getElementById('timer-overlay');if(ov&&!state.timerActive)ov.remove();
const app=document.getElementById('app');
if(state.view==='home')renderHome(app);
else if(state.view==='training')renderTraining(app);
else if(state.view==='history')renderHistory(app);
}

function renderHome(app){
let h='<div class="hdr"><h1>PPL Trainer</h1><button class="hdr-btn" onclick="goHistory()">📋 History</button></div>';
h+='<div class="slabel">Choose your workout</div><div class="tcards">';
for(const[k,p]of Object.entries(PROGRAMS)){
const exList=p.exercises.map(e=>e.name).join(' · ');
const last=getLastSession(k);
const lastInfo=last?`<div style="font-size:11px;color:#555;margin-top:6px">Last: ${formatDate(last.date)}</div>`:'';
h+=`<div class="tcard ${k}" onclick="startTraining('${k}')"><h2 style="color:${p.color}">${p.name} Day</h2><p>${p.exercises.length} exercises · ${p.exercises.reduce((a,e)=>a+e.sets,0)} sets</p><div class="elist">${exList}</div>${lastInfo}</div>`;
}
h+='</div>';app.innerHTML=h;
}

function renderTraining(app){
const p=PROGRAMS[state.type];const c=p.color;
let h=`<div class="shdr"><button class="bbtn" onclick="goHome()">← Back</button><h2 style="color:${c}">${p.name} Day</h2></div>`;
h+=`<div class="warmup${state.warmupDone?' done':''}"><h3>🔥 Warm-up (~5 min)</h3><ul>`;
p.warmup.forEach(w=>{h+=`<li>${w}</li>`;});
h+=`</ul>${state.warmupDone?'<div style="text-align:center;color:#555;font-size:12px;margin-top:8px">✓ Done</div>':`<button class="wbtn" style="background:${c}" onclick="doneWarmup()">Warm-up Complete</button>`}</div>`;
state.session.exercises.forEach((ex,ei)=>{
const prog=p.exercises[ei];
const lastEx=getLastExercise(state.type,ex.id);
const tipOpen=state.openTips.has(ei);
h+=`<div class="excard"><div class="exname">${ex.name}</div><div class="exmeta">${prog.sets} sets × ${prog.reps} reps · ${prog.rest}s rest</div>`;
if(lastEx){
h+=`<span class="exlast"><b>Previous:</b> `;
h+=lastEx.sets.map((s,i)=>`${s.w}kg×${s.r} ${s.f}`).join(' → ');
h+=`</span>`;
}
h+=`<button class="ttog" onclick="toggleTip(${ei})"><span>${tipOpen?'▾':'▸'}</span> 💡 Form tip & illustration</button>`;
h+=`<div class="tbox${tipOpen?' open':''}">`;
h+=getSVG(ex.id,c);
h+=`<p>${prog.tip}</p></div>`;
ex.sets.forEach((s,si)=>{
const done=s.done;
h+=`<div class="srow${done?' done':''}"><span class="slbl">${si+1}</span>`;
h+=`<input class="sinp" type="text" inputmode="decimal" placeholder="kg" value="${s.w}" onchange="setW(${ei},${si},this.value)" onfocus="this.select()">`;
h+=`<span class="sunit">kg</span><span class="sx">×</span>`;
h+=`<input class="sinp" type="text" inputmode="numeric" placeholder="reps" value="${s.r}" onchange="setR(${ei},${si},this.value)" onfocus="this.select()">`;
h+=`<div class="feels">`;
FEELS.forEach(f=>{
h+=`<button class="fb${s.f===f?' on':''}" onclick="setF(${ei},${si},'${f}')">${f}</button>`;
});
h+=`</div>`;
h+=`<button class="sd${done?' chk':''}" onclick="completeSet(${ei},${si})">${done?'✓':'○'}</button>`;
h+=`</div>`;
});
h+=`</div>`;
});
const allDone=state.session.exercises.every(ex=>ex.sets.every(s=>s.done));
h+=`<button class="finbtn" style="background:${allDone?c:'#333'}" ${allDone?'':`disabled`} onclick="finishTraining()">Finish Training</button>`;
app.innerHTML=h;
}

function renderHistory(app){
const month=state.histMonth;
const year=state.histYear;
const monthName=new Date(year,month).toLocaleDateString('en-US',{month:'long',year:'numeric'});

const monthSessions=history.filter(s=>{
const d=new Date(s.date+'T12:00:00');
return d.getMonth()===month&&d.getFullYear()===year;
});

const totalSessions=monthSessions.length;
const totalSets=monthSessions.reduce((a,s)=>a+s.exercises.reduce((b,e)=>b+e.sets.length,0),0);
const totalVol=monthSessions.reduce((a,s)=>a+s.exercises.reduce((b,e)=>b+e.sets.reduce((c,st)=>c+(parseFloat(st.w)||0)*(parseInt(st.r)||0),0),0),0);
const typeCounts={push:0,pull:0,legs:0};
monthSessions.forEach(s=>{if(typeCounts[s.type]!==undefined)typeCounts[s.type]++;});

const firstDay=new Date(year,month,1);
const daysInMonth=new Date(year,month+1,0).getDate();
let startDow=(firstDay.getDay()+6)%7;

const dayMap={};
monthSessions.forEach(s=>{
const day=parseInt(s.date.split('-')[2]);
if(!dayMap[day])dayMap[day]=[];
dayMap[day].push(s);
});

const now=new Date();
const isCurrentMonth=now.getMonth()===month&&now.getFullYear()===year;
const todayDay=now.getDate();
const canGoForward=!(year===now.getFullYear()&&month===now.getMonth());

let h=`<div class="shdr"><button class="bbtn" onclick="goHome()">← Back</button><h2>History</h2></div>`;

h+=`<input type="file" id="file-input" accept=".json,application/json" onchange="handleImport(event)">`;
h+=`<div class="io-bar">`;
h+=`<button class="io-btn" onclick="exportData()">📤 Export</button>`;
h+=`<button class="io-btn" onclick="triggerImport()">📥 Import</button>`;
h+=`</div>`;

h+=`<div class="cal-nav"><button class="cal-arr" onclick="changeMonth(-1)">‹</button><span class="cal-month">${monthName}</span><button class="cal-arr" onclick="changeMonth(1)" ${canGoForward?'':'style="opacity:.3;pointer-events:none"'}>›</button></div>`;

if(totalSessions>0){
h+=`<div class="stats-grid">`;
h+=`<div class="stat-card"><div class="stat-num">${totalSessions}</div><div class="stat-lbl">Sessions</div></div>`;
h+=`<div class="stat-card"><div class="stat-num">${totalSets}</div><div class="stat-lbl">Sets</div></div>`;
h+=`<div class="stat-card"><div class="stat-num">${formatVol(Math.round(totalVol))}</div><div class="stat-lbl">Volume kg</div></div>`;
h+=`<div class="stat-card"><div class="stat-num">${Math.round(totalSets/totalSessions)}</div><div class="stat-lbl">Sets/Sess</div></div>`;
h+=`</div>`;
h+=`<div class="type-bar">`;
if(typeCounts.push)h+=`<div class="type-chip" style="background:#3b82f618;color:#3b82f6;border:1px solid #3b82f630">Push ×${typeCounts.push}</div>`;
if(typeCounts.pull)h+=`<div class="type-chip" style="background:#22c55e18;color:#22c55e;border:1px solid #22c55e30">Pull ×${typeCounts.pull}</div>`;
if(typeCounts.legs)h+=`<div class="type-chip" style="background:#f9731618;color:#f97316;border:1px solid #f9731630">Legs ×${typeCounts.legs}</div>`;
h+=`</div>`;
}else{
h+=`<div class="no-data">No workouts this month</div>`;
}

h+=`<div class="cal-wrap"><div class="cal-grid">`;
['M','T','W','T','F','S','S'].forEach(d=>{
h+=`<div class="cal-hdr">${d}</div>`;
});
for(let i=0;i<startDow;i++){
h+=`<div class="cal-day empty"></div>`;
}
for(let d=1;d<=daysInMonth;d++){
const sessions=dayMap[d]||[];
const isToday=isCurrentMonth&&d===todayDay;
const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const isSel=state.selectedDate===dateStr;
const isFuture=isCurrentMonth&&d>todayDay;

let cls='cal-day has-date';
if(isToday)cls+=' today';
if(sessions.length)cls+=' workout';
if(isSel)cls+=' sel';

let cellStyle='';
if(sessions.length===1){
const col=PROGRAMS[sessions[0].type]?PROGRAMS[sessions[0].type].color:'#888';
cellStyle=`background:${col}12;border-color:${col}40`;
if(isSel)cellStyle=`background:${col}25;border-color:${col}`;
}else if(sessions.length>1){
cellStyle=`background:#ffffff08;border-color:#ffffff20`;
if(isSel)cellStyle=`background:#ffffff15;border-color:#fff`;
}
if(isFuture&&!sessions.length)cellStyle+=(cellStyle?';':'')+'opacity:.3';

h+=`<div class="${cls}" style="${cellStyle}" ${sessions.length?`onclick="selectDate('${dateStr}')"`:''}>`;
h+=`<span class="day-num">${d}</span>`;
if(sessions.length){
h+=`<div class="cal-dots">`;
sessions.forEach(s=>{
const col=PROGRAMS[s.type]?PROGRAMS[s.type].color:'#888';
h+=`<div class="cal-dot" style="background:${col}"></div>`;
});
h+=`</div>`;
}
h+=`</div>`;
}
const totalCells=startDow+daysInMonth;
const remaining=totalCells%7===0?0:7-totalCells%7;
for(let i=0;i<remaining;i++){
h+=`<div class="cal-day empty"></div>`;
}
h+=`</div></div>`;

if(state.selectedDate){
const selSessions=history.filter(s=>s.date===state.selectedDate);
if(selSessions.length){
h+=`<div class="day-detail" id="day-detail">`;
h+=`<div style="font-size:14px;font-weight:600;margin-bottom:12px;color:#aaa">${formatDate(state.selectedDate)}</div>`;
selSessions.forEach(s=>{
const p=PROGRAMS[s.type];
const c=p?p.color:'#888';
const totalSetVol=s.exercises.reduce((a,e)=>a+e.sets.reduce((b,st)=>b+(parseFloat(st.w)||0)*(parseInt(st.r)||0),0),0);
h+=`<div class="dex-hdr" style="color:${c}">${s.type} day — ${formatVol(Math.round(totalSetVol))} kg vol</div>`;
s.exercises.forEach(ex=>{
h+=`<div class="dex"><div class="dex-name">${ex.name}</div>`;
ex.sets.forEach((set,i)=>{
h+=`<div class="dex-set">Set ${i+1}: <span style="color:#ddd">${set.w}kg × ${set.r}</span> ${set.f} <span style="color:#444">${FEEL_LABELS[set.f]||''}</span></div>`;
});
h+=`</div>`;
});
});
h+=`</div>`;
}
}

h+=`<div style="text-align:center;color:#333;font-size:11px;margin-top:20px;padding:8px">${history.length} total sessions stored</div>`;

app.innerHTML=h;

if(state.selectedDate){
setTimeout(()=>{
const el=document.getElementById('day-detail');
if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
},50);
}
}

// ===== ACTIONS =====
function goHome(){state.view='home';state.session=null;state.warmupDone=false;state.openTips.clear();render();}

function goHistory(){
const now=new Date();
state.histMonth=now.getMonth();
state.histYear=now.getFullYear();
state.selectedDate=null;
state.view='history';
render();
}

function changeMonth(delta){
state.histMonth+=delta;
if(state.histMonth>11){state.histMonth=0;state.histYear++;}
if(state.histMonth<0){state.histMonth=11;state.histYear--;}
state.selectedDate=null;
render();
}

function selectDate(dateStr){
state.selectedDate=state.selectedDate===dateStr?null:dateStr;
render();
}

function startTraining(type){
state.view='training';state.type=type;state.warmupDone=false;state.openTips.clear();
const p=PROGRAMS[type];
const session={exercises:p.exercises.map(ex=>{
const last=getLastExercise(type,ex.id);
const sets=[];
for(let i=0;i<ex.sets;i++){
const prevSet=last&&last.sets[i]?last.sets[i]:null;
sets.push({w:prevSet?prevSet.w:'',r:'',f:'',done:false});
}
return{id:ex.id,name:ex.name,sets};
})};
state.session=session;render();
}

function doneWarmup(){state.warmupDone=true;render();}
function toggleTip(i){if(state.openTips.has(i))state.openTips.delete(i);else state.openTips.add(i);render();}

function setW(ei,si,v){state.session.exercises[ei].sets[si].w=v;}
function setR(ei,si,v){state.session.exercises[ei].sets[si].r=v;}
function setF(ei,si,f){
const set=state.session.exercises[ei].sets[si];
set.f=set.f===f?'':f;
render();
}

function completeSet(ei,si){
const set=state.session.exercises[ei].sets[si];
if(!set.w||!set.r){
const rows=document.querySelectorAll('.excard')[ei].querySelectorAll('.srow');
if(rows[si]){rows[si].style.borderColor='#f87171';setTimeout(()=>{rows[si].style.borderColor='';},800);}
return;
}
set.done=true;
const prog=PROGRAMS[state.type].exercises[ei];
const hasMore=state.session.exercises.some(ex=>ex.sets.some(s=>!s.done));
render();
if(hasMore){startRestTimer(prog.rest,PROGRAMS[state.type].color);}
}

function finishTraining(){
const entry={
id:uid(),
date:today(),
type:state.type,
exercises:state.session.exercises.map(ex=>({
id:ex.id,name:ex.name,
sets:ex.sets.map(s=>({w:parseFloat(s.w)||0,r:parseInt(s.r)||0,f:s.f}))
}))
};
history.push(entry);
saveHistory();
state.view='home';state.session=null;state.warmupDone=false;state.openTips.clear();
render();
}

// ===== INIT =====
loadHistory();
render();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
